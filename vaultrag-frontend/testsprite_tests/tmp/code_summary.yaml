version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router)
  - React 19
  - Tailwind CSS 4
  - lucide-react
routes:
  - path: /
    file: app/page.tsx
    auth_required: false
    description: Main VaultRAG chat and search UI
features:
  - name: Conversational RAG search
    description: User asks questions; app posts to backend and shows VaultRAG answers with optional source chunks
    files:
      - app/page.tsx
      - components/ChatWindow.jsx
      - components/InputBar.jsx
      - lib/vaultragApi.ts
    entry_route: /
    user_interactions:
      - Type a question in the bottom input and submit with send button or Enter
      - Click a welcome suggestion pill to send that question immediately
      - See user and system messages, typing indicator while waiting
    api_calls:
      - method: POST
        endpoint: "{API_BASE}/ask"
  - name: Conversation history sidebar
    description: List past chats, start new chat, switch conversation, delete entry
    files:
      - components/HistoryPanel.jsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Open and close sidebar via toggle controls
      - Click New chat to clear active thread
      - Select a recent conversation
      - Delete a conversation from the list
    api_calls: []
  - name: Employee and Executive role (RBAC demo)
    description: Role chip and unlock flow; Executive enables PDF/CSV attach and broader retrieval scope per UI copy
    files:
      - components/Header.jsx
      - components/ExecutiveUnlockModal.jsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - View current role on header chip
      - Click Unlock Executive and confirm modal to switch to Executive
      - Click Use Employee role to return to Employee
    api_calls: []
  - name: Executive file upload
    description: Attach PDF or CSV for ingestion when in Executive mode
    files:
      - components/InputBar.jsx
      - lib/vaultragApi.ts
      - app/page.tsx
    entry_route: /
    user_interactions:
      - In Executive mode, click paperclip and choose PDF or CSV files
      - Send message with attachments shown on user bubble
    api_calls:
      - method: POST
        endpoint: "{API_BASE}/upload-file"
  - name: Theme toggle
    description: Switch between dark and light theme
    files:
      - components/Header.jsx
      - context/ThemeContext.jsx
    entry_route: /
    user_interactions:
      - Click theme toggle in header
    api_calls: []
  - name: Voice input and TTS (browser-dependent)
    description: Optional speech-to-text when supported; optional read-aloud for system replies
    files:
      - components/InputBar.jsx
      - app/page.tsx
    entry_route: /
    user_interactions:
      - Use microphone control when visible
      - Toggle voice output (TTS) control
    api_calls: []
known_limitations:
  - issue: Mic button only renders when browser exposes SpeechRecognition (often absent in headless CI)
    location: components/InputBar.jsx
    impact: Voice input tests may be skipped in some environments
  - issue: Full RAG responses require backend at NEXT_PUBLIC_VAULTRAG_API_URL or default http://127.0.0.1:8000
    location: lib/vaultragApi.ts
    impact: Without API, submit flows may show errors after loading state
